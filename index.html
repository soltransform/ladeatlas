<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ladeatlas</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
  <style>
    #map {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://api.maptiler.com/maps/dataviz-v4/style.json?key=DZSLzpOKk8lkcoLakoMW',
      center: [10.4, 51.2],
      zoom: 5
    });

    map.on('load', () => {
      map.addSource('chargers', {
        type: 'geojson',
        data: 'data/chargers.geojson'
      });

      map.addLayer({
        id: 'chargers-circle',
        type: 'circle',
        source: 'chargers',
        paint: {
          'circle-radius': 2,
          'circle-color': '#00b4d8',
          'circle-opacity': 1
        }
      });
    });
  </script>
</body>
</html>
